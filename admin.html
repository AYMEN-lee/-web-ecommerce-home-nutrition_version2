<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — HN Nutrition</title>
  <link rel="icon" href="assets/img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800;900&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="admin">
  <div id="site-header"></div>
  <main class="wrap" id="adminRoot"></main>

  <!-- editor modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal__head">
        <h3 id="modalTitle">Add product</h3>
        <button class="icon-btn" id="modalClose" aria-label="Close">✕</button>
      </div>
      <div class="modal__body" id="modalBody"></div>
      <div class="modal__foot">
        <button class="btn btn--ghost" id="cancelBtn">Cancel</button>
        <button class="btn btn--accent" id="saveBtn">Save product</button>
      </div>
    </div>
  </div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
